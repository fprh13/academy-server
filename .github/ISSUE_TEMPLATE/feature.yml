name: "✨Feature"
description: "새로운 기능 추가"
title: "[Feature] "
labels: ["feature"]
body:
  - type: input
    id: summary
    attributes:
      label: 기능 요약
      placeholder: 예) 수강신청 목록 조회 API 추가
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 / 문제 상황
      description: 왜 이 기능이 필요한지 작성해주세요.
      placeholder: |
        예)
        - 현재 사용자가 수강신청 목록을 조회할 수 없습니다.
        - 운영/비즈니스 요구사항으로 조회 기능이 필요합니다.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 해결 방법
      description: 어떻게 해결할 것인지 작성해주세요.
      placeholder: |
        예)
        - 수강신청 목록 조회 API를 추가합니다.
        - 페이징 및 정렬 조건을 지원합니다.
        - 응답 DTO를 별도로 구성합니다.
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 작업 범위
      options:
        - label: Controller / API
        - label: Service
        - label: Repository / Query
        - label: DTO
        - label: Test
        - label: Docs

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 이 이슈가 끝났다고 판단할 기준을 적어주세요.
      placeholder: |
        예)
        - [ ] 수강신청 목록 조회 API 동작
        - [ ] 정상/예외 케이스 테스트 작성
        - [ ] API 문서 반영
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: 관련 문서, 이슈, PR, 화면 링크 등을 작성해주세요.
      placeholder: |
        - 관련 PR:
        - 관련 문서:
        - 참고 링크:
    validations:
      required: false