name: "🐞Bug"
description: "버그 수정"
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: 버그 요약
      placeholder: 예) 로그인 시 500 에러 발생
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      placeholder: |
        1. 로그인 요청
        2. 특정 계정 입력
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 정상적으로 로그인되어야 함
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      placeholder: 500 에러 발생
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 원인 분석 (Optional)
      placeholder: 추정 원인 작성

  - type: textarea
    id: solution
    attributes:
      label: 해결 방법
      placeholder: |
        - null 체크 추가
        - 예외 처리 보완
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      placeholder: |
        - 로그:
        - 관련 이슈: