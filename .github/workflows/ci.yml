name: CI

on:
  pull_request:
    branches: [ "develop", "main" ]

permissions: write-all

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: 소스 코드 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 패키지 캐싱
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Gradle 명령어 권한을 부여
        run: chmod +x gradlew

      - name: Gradle build 진행
        run: ./gradlew build -Dspring.profiles.active=dev

      - name: 테스트 결과 PR 코멘트 등록
        uses: EnricoMi/publish-unit-test-result-action@v1
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'

      - name: 테스트 실패 시, 실패한 코드 라인에 Check 코멘트를 등록
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          token: ${{ github.token }}

      - name: 테스트 커버리지 PR 코멘트 등록
        id: jacoco
        uses: Madrapps/jacoco-report@v1.7.1
        with:
          title: "⚙️ 테스트 커버리지 분석 결과"
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 5 # 추후 기준값 변경 필요
          min-coverage-changed-files: 5
          update-comment: true

      - name: jacoco HTML report 업로드
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: ${{ github.workspace }}/build/reports/jacoco/test/html
