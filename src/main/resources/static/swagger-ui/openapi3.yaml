              examples:
                아이디_중복_체크_4xx_loing-id_중복:
                  value: |-
                    {
                      "message" : "이미 사용 중인 아이디입니다.",
                      "data" : null
                    }
components:
  schemas:
    PublicUserProfileResponse:
      title: PublicUserProfileResponse
      required:
      - message
      type: object
      properties:
        data:
          required:
          - email
          - name
          type: object
          properties:
            name:
              type: string
              description: 사용자 이름입니다.
            email:
              type: string
              description: 사용자 이메일입니다.
        message:
          type: string
          description: 성공 응답 메세지입니다.
    RegisterUserRequest:
      title: RegisterUserRequest
      required:
      - email
      - loginId
      - name
      - password
      type: object
      properties:
        password:
          type: string
          description: 비밀번호는 특수문자를 포함한 영문과 숫자 8자리 이상입니다.
        loginId:
          type: string
          description: 아이디는 영문 4자리 이상입니다.
        name:
          type: string
          description: 사용자 이름입니다.
        email:
          type: string
          description: 이메일 형식을 지켜주세요.
    ApiResponse:
      title: ApiResponse
      type: object
    AuthenticateUserRequest:
      title: AuthenticateUserRequest
      required:
      - loginId
      - password
      type: object
      properties:
        password:
          type: string
          description: 비밀번호는 특수문자를 포함한 영문과 숫자 8자리 이상입니다.
        loginId:
          type: string
          description: 아이디는 영문 4자리 이상입니다.
    UserProfileResponse:
      title: UserProfileResponse
      required:
      - message
      type: object
      properties:
        data:
          required:
          - email
          - loginId
          - name
          type: object
          properties:
            loginId:
              type: string
              description: 사용자 아이디입니다.
            name:
              type: string
              description: 사용자 이름입니다.
            email:
              type: string
              description: 사용자 이메일입니다.
        message:
          type: string
          description: 성공 응답 메세지입니다.
    ApiErrorResponse:
      title: ApiErrorResponse
      type: object
  securitySchemes:
    JWT:
      type: apiKey
      name: Authorization
      in: header
security:
  - JWT: []  